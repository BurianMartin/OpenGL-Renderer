<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="cubeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Isometric wireframe cube: outer hexagon + 3 spokes from the shared
       front vertex, forming three visible rhombus faces (top/left/right). -->
  <polygon points="50,8 88,29 88,71 50,92 12,71 12,29"
           fill="none" stroke="url(#cubeGradient)" stroke-width="5"
           stroke-linejoin="round"/>
  <polyline points="50,50 50,8" fill="none" stroke="url(#cubeGradient)" stroke-width="5" stroke-linecap="round"/>
  <polyline points="50,50 88,71" fill="none" stroke="url(#cubeGradient)" stroke-width="5" stroke-linecap="round"/>
  <polyline points="50,50 12,71" fill="none" stroke="url(#cubeGradient)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="50" cy="50" r="4" fill="url(#cubeGradient)"/>
</svg>
